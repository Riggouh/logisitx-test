name: logistix
services:
  logistix:
    build: .
    ports:
      - "48432:48432"
    volumes:
      - logistix-game-data:/data
    environment:
      - DATA_DIR=/data
      # Security: Set to your domain to restrict API access (default: * = open)
      # - CORS_ORIGIN=https://logistix.example.com
      # Rate limit: max requests per minute per IP (default: 200)
      # - RATE_MAX=200
    restart: unless-stopped
volumes:
  logistix-game-data:
